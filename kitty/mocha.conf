# vim:ft=kitty

## name:     Red-Black
## blurb:    Near-black background, red accents, legible ANSI set

# The basic colors
foreground              #F0F0F0
background              #0D0D0D
selection_foreground    #F0F0F0
selection_background    #CC0000

# Cursor colors
cursor                  #FF3333
cursor_text_color       #0D0D0D

# URL underline color when hovering with mouse
url_color               #FF6666

# Kitty window border colors
active_border_color     #FF3333
inactive_border_color   #666666
bell_border_color       #FF6666

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #F0F0F0
active_tab_background   #CC0000
inactive_tab_foreground #F0F0F0
inactive_tab_background #1A1A1A
tab_bar_background      #0D0D0D

# Colors for marks (marked text in the terminal)
mark1_foreground #0D0D0D
mark1_background #FF3333
mark2_foreground #F0F0F0
mark2_background #CC0000
mark3_foreground #0D0D0D
mark3_background #FF6666

# The 16 terminal colors
# black
color0 #3A3A3A
color8 #555555
# red
color1 #FF5555
color9 #FF7B7B
# green
color2  #A6E3A1
color10 #A6E3A1
# yellow
color3  #F9E2AF
color11 #F9E2AF
# blue
color4  #89B4FA
color12 #89B4FA
# magenta
color5  #F5C2E7
color13 #F5C2E7
# cyan
color6  #94E2D5
color14 #94E2D5
# white
color7  #F0F0F0
color15 #FFFFFF