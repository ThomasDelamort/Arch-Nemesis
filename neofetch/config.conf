# ============================================================
#  ~/.config/neofetch/config.conf  —  Gargantua / Hyprland
# ============================================================

print_info() {
    info title
    info underline

    info "OS"       distro
    info "Kernel"   kernel
    info "Packages" packages
    info "Uptime"   uptime
    info "WM"       wm
    info "Shell"    shell
    info "Term"     term
    info "CPU"      cpu
    info "GPU"      gpu
    info "Memory"   memory

    info cols
}

# ── Text formatting ─────────────────────────────────────────
title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
memory_percent="on"
memory_unit="gib"
package_managers="on"

# ── Colours & separators ────────────────────────────────────
# colors=(title  @  underline  subtitle/keys  info1  info2)
colors=(4 6 8 6 7 7)
bold="on"
underline_enabled="on"
underline_char="─"
separator=" "

# ── ASCII logo ──────────────────────────────────────────────
image_backend="ascii"
image_source="$HOME/.config/neofetch/myascii.txt"
ascii_bold="on"

# Gap between the logo and the info block. If the info column sits
# too far right (raw-ANSI art inflates the measured width), lower
# this — it can even go negative, e.g. gap=-6.
gap=3
